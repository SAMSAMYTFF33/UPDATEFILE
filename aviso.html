<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>تطبيق المهام</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 30px; background: #f0f0f0; }
    button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; background: #2AABEE; color: white; margin-top: 20px; }
  </style>
</head>
<body>
  <h2 id="welcome">جاري التحميل...</h2>
  <p id="status">الحالة: غير متصل</p>
  <button onclick="syncWithBot()">مزامنة مع البوت</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    document.getElementById("welcome").innerText = user
      ? `أهلاً ${user.first_name} 👋 (ID: ${user.id})`
      : "تعذر التعرف على المستخدم";

    function syncWithBot() {
      document.getElementById("status").innerText = "الحالة: جاري الإرسال...";
      tg.sendData(JSON.stringify({
        type: "sync",
        user_id: user?.id,
        username: user?.username
      }));
    }
  </script>
</body>
</html>
