<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفصول</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle at center, #001122, #000000 80%); 
        font-family: Arial, Helvetica, sans-serif;
    }

    .container {
        width: 90%;
        max-width: 400px;
        display: flex;
        flex-direction: column; 
        gap: 30px; 
    }

    .neon-btn {
        text-align: center;
        padding: 25px;
        text-decoration: none;
        font-size: 24px;
        font-weight: bold;
        color: white;
        border-radius: 20px;
        transition: 0.3s;
        background: #111;
        border: 2px solid transparent;
        background-image: linear-gradient(#111, #111),
                          linear-gradient(90deg, #0088ff, #00ffff);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        box-shadow: 0 0 10px #0088ff, 0 0 20px #00ffff;
    }

    .neon-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px #0088ff, 0 0 50px #00ffff;
        color: #00ffff;
    }

    @media(max-width: 500px) {
        .neon-btn {
            font-size: 20px;
            padding: 20px;
        }
    }
</style>
</head>
<body>

    <div class="container">
        <a href="Chapters.html" class="neon-btn">الفصل الأول</a>
        
        <a href="Chapters.html" class="neon-btn">الفصل الثاني</a>
    </div>

</body>
</html>
