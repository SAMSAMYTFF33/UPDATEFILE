<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S2 | نسخة الضحك والنشاط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان "فرفوشة" أكتر */
            --primary: #ff0077; /* وردي فاقع */
            --secondary: #ffea00; /* أصفر مشع */
            --bg-dark: #12002f; /* بنفسجي غامق جداً */
            --card-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-glow: 0 0 20px rgba(255, 0, 119, 0.5);
            --text-dark: #fff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 60px 0 80px;
            background: var(--bg-dark);
            color: var(--text-dark);
            overflow-x: hidden;
            /* خلفية من عالم آخر */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 119, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 234, 0, 0.1) 0%, transparent 40%);
        }

        /* شعار مهتز */
        .logo-box {
            margin: 20px 0 40px;
            text-align: center;
        }
        .logo {
            font-size: 60px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shake 0.5s infinite;
            display: inline-block;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px; /* مسافة بين الأزرار */
            padding: 0 15px;
        }

        /* أزرار بتأثير "جيلي" */
        .neon-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 25px;
            text-decoration: none;
            color: white;
            background: var(--card-bg);
            border: 2px solid var(--glass-border);
            border-radius: 20px; /* حواف دائرية أكثر */
            backdrop-filter: blur(10px);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover {
            transform: scale(1.05) rotate(1deg);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
        }

        .neon-btn i {
            font-size: 24px;
            color: var(--secondary);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* زر القائمة بشكل دائري مضحك */
        .menu-btn {
            position: fixed; top: 20px; left: 20px;
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; font-size: 24px; cursor: pointer;
            z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* القائمة الجانبية باللون الوردي */
        .side-menu {
            position: fixed; top: 0; left: -320px;
            width: 280px; height: 100vh;
            background: rgba(255, 0, 119, 0.9);
            backdrop-filter: blur(20px);
            z-index: 999; padding: 100px 20px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-right: 5px solid var(--secondary);
        }
        .side-menu.open { left: 0; }

        .side-menu button {
            width: 100%; padding: 15px; margin-bottom: 10px;
            border-radius: 50px; border: none;
            background: white; color: var(--primary);
            font-weight: bold; cursor: pointer;
        }

        /* توست (إشعار) مضحك */
        .edit-toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--secondary); color: #000;
            padding: 10px 25px; border-radius: 50px;
            font-weight: 800; z-index: 4000;
            display: none; border: 2px solid #000;
        }

    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">🤪</button>

    <div class="side-menu" id="sideMenu">
        <button onclick="toggleTheme()">🌈 تغيير المود (رايق/معصب)</button>
        <button onclick="toggleEditMode()">✍️ شخبط على العناوين</button>
        <button onclick="showToast('جاري البحث عن تحديث.. أو ربما عن غداء!')">🚀 تحديث النسخة</button>
    </div>

    <div class="logo-box">
        <div class="logo">S2 LOL</div>
        <p style="color: var(--secondary); font-weight: bold;">أقوى نسخة لطلاب "ما بعد منتصف الليل"</p>
    </div>

    <div class="container" id="mainContainer">
        <a href="M1.html" class="neon-btn">
            <i class="fas fa-handshake-angle"></i> <span class="btn-text">مذاكرة كيف تصبح ديبلوماسياً (بالواسطة)</span>
        </a>
        <a href="M2.html" class="neon-btn">
            <i class="fas fa-money-bill-trend-up"></i> <span class="btn-text">قانون كيف تفتح بيزنس وتفلس بسرعة</span>
        </a>
        <a href="M3.html" class="neon-btn">
            <i class="fas fa-user-ninja"></i> <span class="btn-text">قانون المجرمين (لا تحاول تجرب في البيت)</span>
        </a>
        <a href="M4.html" class="neon-btn">
            <i class="fas fa-chain-broken"></i> <span class="btn-text">نظرية الالتزامات (التي لا نلتزم بها)</span>
        </a>
        <a href="M5.html" class="neon-btn">
            <i class="fas fa-building-columns"></i> <span class="btn-text">الإدارة العامة (فن الانتظار في الدور)</span>
        </a>
        <a href="M6.html" class="neon-btn">
            <i class="fas fa-ghost"></i> <span class="btn-text">معاملات إلكترونية (سرقة الواي فاي)</span>
        </a>
        <a href="M7.html" class="neon-btn">
            <i class="fas fa-brain"></i> <span class="btn-text">ذكاء اصطناعي (عشان نغش بالراحة)</span>
        </a>
    </div>

    <div class="edit-toast" id="toastMsg"></div>

    <script>
        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("open");
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function toggleEditMode() {
            showToast("تقدر الحين تشخبط براحتك! 😂");
            document.querySelectorAll('.btn-text').forEach(span => {
                span.contentEditable = span.contentEditable === "true" ? "false" : "true";
                span.style.background = span.contentEditable === "true" ? "yellow" : "transparent";
                span.style.color = span.contentEditable === "true" ? "black" : "white";
            });
        }

        function toggleTheme() {
            const colors = ['#ff0077', '#00ff88', '#00bdff', '#ffea00', '#ff5722'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.documentElement.style.setProperty('--primary', randomColor);
            showToast("تم تغيير لون الحياة! 🎨");
        }
    </script>
</body>
</html>
