<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S2 | Ultimate Precision Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00bdff;
            --bg-dark: #050a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg-dark);
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 189, 255, 0.15) 0px, transparent 50%);
            -webkit-user-select: none;
            user-select: none;
        }

        .header-nav {
            width: 90%; max-width: 500px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0;
        }

        .update-btn {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            color: var(--primary); padding: 8px 20px; border-radius: 12px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px); font-size: 14px; font-weight: bold;
        }
        .update-btn:hover {
            transform: scale(1.05); background: var(--primary); color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .logo-box {
            position: relative; margin: 20px 0 40px;
            animation: float 4s ease-in-out infinite;
        }
        .logo {
            font-size: 50px; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- التعديل هنا فقط: الحاوية أصبحت بعرض الشاشة الكامل --- */
        .container {
            width: 100%; /* عرض كامل */
            max-width: none; /* إلغاء الحد الأقصى */
            display: flex; 
            flex-direction: column;
            gap: 1px; /* فجوة بسيطة جداً كخط فاصل */
            padding-bottom: 50px;
        }

        /* --- التعديل هنا فقط: المستطيلات أصبحت ممتدة بدون حواف دائرية جانبية --- */
        .neon-btn {
            position: relative;
            display: flex; align-items: center; gap: 15px;
            padding: 20px 25px; /* زيادة الطول قليلاً */
            text-decoration: none; font-size: 16px; font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            background: var(--card-bg);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            border-left: none; /* إزالة الحدود الجانبية */
            border-right: none;
            border-radius: 0; /* إزالة الانحناء ليمتد من الحافة للحافة */
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
            box-sizing: border-box;
            
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }

        .neon-btn i { font-size: 20px; color: var(--primary); transition: 0.3s; }

        .neon-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* تحسين مظهر السحب للمستطيلات الكاملة */
        .sortable-ghost {
            opacity: 0.3;
            background: rgba(255, 80, 80, 0.2) !important;
        }

        .sortable-drag {
            opacity: 1 !important;
            background: #002200 !important; 
            color: #fff !important;
            border-y: 2px solid var(--primary) !important;
            transform: scale(1.02) !important; /* تكبير بسيط جداً ليظهر السحب */
        }
        
        .sortable-drag i { color: #fff !important; }

        .sortable-fallback {
            transition: transform 0.2s ease;
        }
    </style>
</head>

<body oncontextmenu="return false;">

<div class="header-nav">
    <div style="font-size: 12px; color: var(--primary); opacity: 0.7;">V 2.0.1</div>
    <button class="update-btn" onclick="checkForUpdate()">
        <i class="fas fa-sync-alt"></i> update
    </button>
</div>

<div class="logo-box">
    <div class="logo">S2</div>
</div>

<div class="container" id="main-list">
    <a href="M1.html" class="neon-btn" data-id="m1">
        <i class="fas fa-globe-americas"></i> مدخل للعلاقات الدولية
    </a>
    <a href="M2.html" class="neon-btn" data-id="m2">
        <i class="fas fa-gavel"></i> القانون التجاري الأساسي
    </a>
    <a href="M3.html" class="neon-btn" data-id="m3">
        <i class="fas fa-balance-scale"></i> القانون الجنائي العام
    </a>
    <a href="M4.html" class="neon-btn" data-id="m4">
        <i class="fas fa-file-contract"></i> النظرية العامة للإلتزامات
    </a>
    <a href="M5.html" class="neon-btn" data-id="m5">
        <i class="fas fa-university"></i> القانون الإداري والتنظيم الإداري
    </a>
    <a href="M6.html" class="neon-btn" data-id="m6">
        <i class="fas fa-laptop-code"></i> قانون معاملات الكترونية
    </a>
    <a href="M7.html" class="neon-btn" data-id="m7">
        <i class="fas fa-robot"></i> المهارات الرقمية والذكاء الاصطناعي
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
const el = document.getElementById('main-list');
let isDragging = false; 

new Sortable(el, {
    animation: 300,
    delay: 400,              
    delayOnTouchOnly: true,  
    touchStartThreshold: 10, 
    forceFallback: true,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',

    onStart: function() {
        isDragging = true; 
        if (navigator.vibrate) navigator.vibrate(40);
    },
    onEnd: function() {
        setTimeout(() => { isDragging = false; }, 50); 
        const order = Array.from(el.children).map(child => child.getAttribute('data-id'));
        localStorage.setItem('s2-menu-order-final', JSON.stringify(order));
    }
});

window.onload = function() {
    const savedOrder = JSON.parse(localStorage.getItem('s2-menu-order-final'));
    if (savedOrder) {
        savedOrder.forEach(id => {
            const item = el.querySelector(`[data-id="${id}"]`);
            if (item) el.appendChild(item);
        });
    }
};

el.addEventListener('click', function(e) {
    if (isDragging) {
        e.preventDefault();
    }
});

function checkForUpdate() {
    if (typeof AndroidBridge !== 'undefined') {
        AndroidBridge.checkForUpdate();
    } else {
        alert("زر التحديث يعمل فقط داخل التطبيق 🚀");
    }
}
</script>

</body>
</html>
