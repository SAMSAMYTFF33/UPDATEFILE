<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Page | S2 Neon Menu</title>
<style>
body{
margin:0;
padding:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
background: radial-gradient(circle at top,#001a00,#000000 70%);
font-family:Arial, Helvetica, sans-serif;
color:white;
padding-top:20px;
}

/* حاوية زر التحديث */
.update-container {
width: 90%;
max-width: 500px;
display: flex;
justify-content: flex-end; /* جعل الزر جهة اليمين */
position: relative;
margin-bottom: 10px;
}

.update-btn {
background: transparent;
border: 1px solid #00ff00;
color: white;
font-size: 14px;
padding: 5px 12px;
border-radius: 20px;
cursor: pointer;
box-shadow: 0 0 5px #00ff00;
transition: 0.3s;
}

.update-btn:hover {
box-shadow: 0 0 15px #00ff00;
transform: scale(1.05);
background: rgba(0,255,0,0.1);
}

/* شعار */
.logo{
margin-bottom:30px;
font-size:55px;
font-weight:bold;
color:#00ff00;
padding:15px 80px;
border-radius:60px;
border:3px solid transparent;
background: linear-gradient(#000,#000) padding-box,
linear-gradient(90deg,#00ff00,#00ff88) border-box;
box-shadow:0 0 25px #00ff00,
0 0 50px #00ff88;
text-align:center;
}

.container{
width:90%;
max-width:500px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

.neon-btn{
flex:1;
margin:0 10px;
text-align:center;
padding:15px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:white;
border-radius:40px;
position:relative;
transition:0.3s;
background:#111;
border:2px solid transparent;
background-image: linear-gradient(#111,#111),
linear-gradient(90deg,#00ff00,#00ff88);
background-origin:border-box;
background-clip:padding-box,border-box;
box-shadow:0 0 10px #00ff00,
0 0 20px #00ff88;
}

.neon-btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px #00ff00,
0 0 50px #00ff88;
}

.single-row{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

@media(max-width:500px){
.row, .single-row{
flex-direction:column;
}
.neon-btn{
margin:10px 0;
}
.logo{
font-size:12vw;
padding:10px 20px;
}
}
</style>
</head>
<body>

<div class="update-container">
<button class="update-btn" onclick="checkForUpdate()">update</button>
</div>

<div class="logo">S2</div>

<div class="container">
<div class="row">
<a href="M1.html" class="neon-btn">مدخل للعلاقات الدولية </a>
<a href="M2.html" class="neon-btn">القانون التجاري الأساسي</a>
</div>

<div class="row">
<a href="M3.html" class="neon-btn">القانون الجنائي العام</a>
<a href="M4.html" class="neon-btn">النضرية العامة الإلتزامات</a>
</div>

<div class="single-row">
<a href="M5.html" class="neon-btn">مدخل للقانون الإداري وتنضيم الإداري</a>
<a href="M6.html" class="neon-btn">قانون معاملات الكترونية </a>
<a href="M7.html" class="neon-btn">المهارات الرقمية ودكاء الإصطناعي</a>
</div>
</div>

<script>
// وظيفة زر التحديث
function checkForUpdate() {
    if (typeof AndroidBridge !== 'undefined') {
        AndroidBridge.checkForUpdate();
    } else {
        alert('زر التحديث يعمل فقط داخل التطبيق');
    }
}
</script>

</body>
</html>
