<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S2 | Ultimate Precision Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'Tajawal';
            src: url('file:///storage/emulated/0/Android/data/com.S2/files/Tajawal-Regular.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Tajawal';
            src: url('file:///storage/emulated/0/Android/data/com.S2/files/Tajawal-Bold.ttf') format('truetype');
            font-weight: 700;
        }

        :root {
            --primary: #00ff88;
            --secondary: #00bdff;
            --bg-dark: #050a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --neon-glow: 0 0 15px rgba(0, 255, 136, 0.3);
            --text-dark: #fff;
        }

        /* الوضع الفاتح */
        body.light-mode {
            --primary: #00a859;
            --secondary: #008cb3;
            --bg-dark: #f4f6f9;
            --card-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --neon-glow: 0 0 15px rgba(0, 168, 89, 0.2);
            --text-dark: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 60px 0 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-dark);
            color: var(--text-dark);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 189, 255, 0.15) 0px, transparent 50%);
            -webkit-user-select: none;
            user-select: none;
        }

        /* زر القائمة (3 شرطات) في الجانب الأيسر */
        .menu-btn {
            position: fixed; top: 20px; left: 20px;
            font-size: 24px; width: 50px; height: 50px;
            border-radius: 15px; background: var(--card-bg);
            backdrop-filter: blur(10px); color: var(--primary);
            border: 1px solid var(--glass-border); cursor: pointer;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glass-shadow); transition: 0.3s;
        }

        /* نحتفظ بالتوهج عند اللمس ولكن نزيل الدوران */
        .menu-btn:hover { box-shadow: var(--neon-glow); }

        /* نضيف كلاس جديد مسؤول عن الدوران فقط */
        .menu-btn.rotate-active { transform: rotate(90deg); }

        /* القائمة الجانبية المنزلقة (الإعدادات) */
        .side-menu {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100vh;
            padding: 90px 25px 25px;
            transition: left 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 0 30px 30px 0;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
        }
        .side-menu.open {
            left: 0;
        }
        .side-menu button {
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dark);
        }
        .side-menu button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .theme-btn {
            border-left: 4px solid var(--primary) !important;
        }
        .edit-mode-btn {
            border-left: 4px solid var(--secondary) !important;
        }
        .update-menu-btn {
            border-left: 4px solid var(--secondary) !important;
        }

        /* زر update الأصلي في الجانب الأيمن العلوي */
        .update-top-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .update-top-btn:hover {
            transform: scale(1.05);
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* الشعار المتحرك */
        .logo-box {
            position: relative;
            margin: 20px 0 40px;
            animation: float 4s ease-in-out infinite;
            text-align: center;
        }
        .logo {
            font-size: 50px;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* الحاوية الرئيسية - عرض كامل */
        .container {
            width: 100%;
            max-width: none;
            display: flex;
            flex-direction: column;
            gap: 1px;
            z-index: 10;
            padding-bottom: 50px;
        }

        /* أزرار المواد - نمط مستطيلات كاملة الحواف */
        .neon-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 25px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            background: var(--card-bg);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            border-left: none;
            border-right: none;
            border-radius: 0;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }
        .neon-btn i {
            font-size: 20px;
            color: var(--primary);
            transition: 0.3s;
        }
        .neon-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* وضع التعديل */
        .edit-mode-active [contenteditable="true"] {
            outline: 2px dashed var(--secondary);
            outline-offset: 4px;
            animation: pulseBorder 1.5s infinite;
            cursor: text;
        }
        @keyframes pulseBorder {
            0% { outline-color: var(--secondary); }
            50% { outline-color: transparent; }
            100% { outline-color: var(--secondary); }
        }

        /* البوب اب الخاص بالتعديل */
        .edit-popup, .confirm-popup {
            position: fixed;
            display: flex;
            gap: 10px;
            border-radius: 50px;
            padding: 8px 15px;
            z-index: 2000;
            transform: translate(-50%, -100%);
            pointer-events: none;
            opacity: 0;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        .edit-popup.show, .confirm-popup.show {
            pointer-events: all;
            opacity: 1;
            transform: translate(-50%, -120%);
        }
        .edit-popup button, .confirm-popup button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .edit-popup button:hover, .confirm-popup button:hover {
            transform: scale(1.1);
        }
        .delete-btn {
            background: #ff4757;
            color: white;
        }
        .edit-btn-popup {
            background: var(--secondary);
            color: #000;
        }
        .cancel-btn-popup {
            background: #747d8c;
            color: white;
        }
        .confirm-edit-btn {
            background: #2ed573;
            color: white;
        }
        .cancel-edit-btn {
            background: #ff4757;
            color: white;
        }

        /* مودال التأكيد */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            padding: 30px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            text-align: center;
        }
        .modal-content h3 {
            font-size: 1.6rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-buttons button:hover {
            transform: translateY(-3px);
        }

        /* توست الإشعارات */
        .edit-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-dark);
            backdrop-filter: blur(15px);
            color: var(--text-dark);
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            border-right: 4px solid var(--primary);
            box-shadow: var(--glass-shadow);
            z-index: 4000;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .edit-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* تحسين سحب وترتيب المواد */
        .sortable-ghost {
            opacity: 0.3;
            background: rgba(255, 80, 80, 0.2) !important;
        }
        .sortable-drag {
            opacity: 1 !important;
            background: #002200 !important;
            border-top: 2px solid var(--primary) !important;
            border-bottom: 2px solid var(--primary) !important;
            transform: scale(1.02);
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <!-- زر القائمة (3 شرطات) في الجانب الأيسر -->
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    
    

    <!-- القائمة الجانبية المنزلقة (الإعدادات) - تم إزالة زر إضافة مادة جديدة -->
    <div class="side-menu" id="sideMenu">
        <button class="theme-btn" onclick="toggleTheme()">
            <i class="fas fa-moon"></i> الوضع المظلم / الفاتح
        </button>
        <button class="edit-mode-btn" onclick="toggleEditMode()">
            <i class="fas fa-edit"></i> <span id="editModeText">تفعيل التعديل</span>
        </button>
        <button class="update-menu-btn" onclick="checkForUpdate()">
            <i class="fas fa-cloud-download-alt"></i> التحقق من التحديث
        </button>
    </div>

    <!-- الشعار -->
    <div class="logo-box">
        <div class="logo">S2</div>
    </div>

    <!-- الحاوية الرئيسية للمواد -->
    <div class="container" id="mainContainer">
        <a href="M1.html" class="neon-btn" data-id="m1" data-original-href="M1.html">
            <i class="fas fa-globe-americas"></i> <span class="btn-text">مدخل للعلاقات الدولية</span>
        </a>
        <a href="M2.html" class="neon-btn" data-id="m2" data-original-href="M2.html">
            <i class="fas fa-gavel"></i> <span class="btn-text">القانون التجاري الأساسي</span>
        </a>
        <a href="M3.html" class="neon-btn" data-id="m3" data-original-href="M3.html">
            <i class="fas fa-balance-scale"></i> <span class="btn-text">القانون الجنائي العام</span>
        </a>
        <a href="M4.html" class="neon-btn" data-id="m4" data-original-href="M4.html">
            <i class="fas fa-file-contract"></i> <span class="btn-text">النظرية العامة للإلتزامات</span>
        </a>
        <a href="M5.html" class="neon-btn" data-id="m5" data-original-href="M5.html">
            <i class="fas fa-university"></i> <span class="btn-text">القانون الإداري والتنظيم الإداري</span>
        </a>
        <a href="M6.html" class="neon-btn" data-id="m6" data-original-href="M6.html">
            <i class="fas fa-laptop-code"></i> <span class="btn-text">قانون معاملات الكترونية</span>
        </a>
        <a href="M7.html" class="neon-btn" data-id="m7" data-original-href="M7.html">
            <i class="fas fa-robot"></i> <span class="btn-text">المهارات الرقمية والذكاء الاصطناعي</span>
        </a>
    </div>

    <!-- مودال تأكيد الحذف -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <h3 style="color: #ff4757;"><i class="fas fa-exclamation-triangle"></i> تأكيد الحذف</h3>
            <p style="margin-bottom: 20px; font-size: 1.1rem;">هل أنت متأكد من حذف هذه المادة؟</p>
            <div class="modal-buttons">
                <button onclick="confirmDeleteMaterial()" style="background: #ff4757; color: white;"><i class="fas fa-trash"></i> حذف</button>
                <button onclick="closeDeleteModal()" style="background: var(--secondary); color: #000;"><i class="fas fa-times"></i> إلغاء</button>
            </div>
        </div>
    </div>

    <!-- بوب اب التعديل (حذف/تعديل/إلغاء) -->
    <div class="edit-popup" id="editPopup">
        <button class="delete-btn" onclick="requestDeleteMaterial()"><i class="fas fa-trash"></i></button>
        <button class="edit-btn-popup" onclick="startEditText()"><i class="fas fa-pen"></i></button>
        <button class="cancel-btn-popup" onclick="hideEditPopup()"><i class="fas fa-times"></i></button>
    </div>

    <!-- بوب اب تأكيد التعديل النصي -->
    <div class="confirm-popup" id="confirmPopup">
        <button class="confirm-edit-btn" onclick="confirmTextEdit()"><i class="fas fa-check"></i></button>
        <button class="cancel-edit-btn" onclick="cancelTextEdit()"><i class="fas fa-times"></i></button>
    </div>

    <!-- توست الإشعارات -->
    <div class="edit-toast" id="toastMsg">
        <i class="fas fa-info-circle"></i> <span id="toastText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        // ======================== المتغيرات العامة ========================
        let editMode = false;           // وضع التعديل
        let currentEditElement = null;  // العنصر الجاري تعديله
        let originalText = '';          // النص الأصلي قبل التعديل
        let materialToDelete = null;    // المادة المراد حذفها

        // تهيئة الترتيب باستخدام SortableJS
        const container = document.getElementById('mainContainer');
        let sortableInstance = null;

        function initSortable() {
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(container, {
                animation: 300,
                delay: 400,
                delayOnTouchOnly: true,
                touchStartThreshold: 10,
                forceFallback: true,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                onStart: function() {
                    if (navigator.vibrate) navigator.vibrate(40);
                },
                onEnd: function() {
                    saveOrderToLocal();
                }
            });
        }

        function saveOrderToLocal() {
            const order = Array.from(container.children).map(child => child.getAttribute('data-id'));
            localStorage.setItem('s2-materials-order', JSON.stringify(order));
        }

        function restoreOrderFromLocal() {
            const savedOrder = localStorage.getItem('s2-materials-order');
            if (savedOrder) {
                const orderArray = JSON.parse(savedOrder);
                orderArray.forEach(id => {
                    const item = container.querySelector(`[data-id="${id}"]`);
                    if (item) container.appendChild(item);
                });
            }
        }

        // ======================== إدارة القائمة الجانبية ========================
        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("open");
            document.querySelector(".menu-btn").classList.toggle("rotate-active");
        }

        // ======================== إدارة الثيم (فاتح/مظلم) ========================
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('s2-theme', isLight ? 'light' : 'dark');
            const themeBtn = document.querySelector('.theme-btn');
            if (isLight) themeBtn.innerHTML = '<i class="fas fa-sun"></i> الوضع المظلم';
            else themeBtn.innerHTML = '<i class="fas fa-moon"></i> الوضع الفاتح';
            showToast(isLight ? 'الوضع الفاتح' : 'الوضع المظلم');
        }

        function loadTheme() {
            const saved = localStorage.getItem('s2-theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                document.querySelector('.theme-btn').innerHTML = '<i class="fas fa-sun"></i> الوضع المظلم';
            } else {
                document.body.classList.remove('light-mode');
                document.querySelector('.theme-btn').innerHTML = '<i class="fas fa-moon"></i> الوضع الفاتح';
            }
        }

        // ======================== وضع التعديل ========================
        function toggleEditMode() {
            editMode = !editMode;
            const editBtnSpan = document.getElementById('editModeText');
            if (editMode) {
                document.body.classList.add('edit-mode-active');
                editBtnSpan.innerText = 'إنهاء التعديل';
                showToast('وضع التعديل نشط - اضغط مطولاً على أي مادة لتظهر الخيارات');
            } else {
                document.body.classList.remove('edit-mode-active');
                editBtnSpan.innerText = 'تفعيل التعديل';
                document.querySelectorAll('[contenteditable="true"]').forEach(el => el.removeAttribute('contenteditable'));
                hideEditPopup();
                hideConfirmPopup();
                showToast('وضع التعديل غير نشط');
            }
            localStorage.setItem('s2-edit-mode', editMode ? 'enabled' : 'disabled');
        }

        function loadEditMode() {
            const saved = localStorage.getItem('s2-edit-mode');
            if (saved === 'enabled') {
                editMode = true;
                document.body.classList.add('edit-mode-active');
                document.getElementById('editModeText').innerText = 'إنهاء التعديل';
            } else {
                editMode = false;
                document.body.classList.remove('edit-mode-active');
                document.getElementById('editModeText').innerText = 'تفعيل التعديل';
            }
        }

        // ======================== معالجة الضغط الطويل ========================
        function handleLongPress(element, e) {
            if (!editMode) return;
            if (element.hasAttribute('contenteditable')) return;

            currentEditElement = element;
            const textSpan = element.querySelector('.btn-text');
            originalText = textSpan ? textSpan.innerText : element.innerText;

            const touch = e.touches ? e.touches[0] : e;
            const popup = document.getElementById('editPopup');
            const rect = element.getBoundingClientRect();
            let popY = rect.top - 10;
            if (popY < 60) popY = rect.bottom + 60;
            popup.style.left = touch.clientX + 'px';
            popup.style.top = popY + 'px';
            popup.classList.add('show');
            hideConfirmPopup();
        }

        let pressTimer = null;
        function onTouchStart(e) {
            if (!editMode) return;
            const element = e.target.closest('.neon-btn');
            if (!element) return;
            pressTimer = setTimeout(() => {
                handleLongPress(element, e);
                pressTimer = null;
            }, 500);
        }
        function onTouchEnd() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }
        function onTouchMove() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }

        // ======================== وظائف الحذف والتعديل ========================
        function requestDeleteMaterial() {
            if (currentEditElement) {
                materialToDelete = currentEditElement;
                hideEditPopup();
                document.getElementById('deleteModal').classList.add('show');
            }
        }

        function confirmDeleteMaterial() {
            if (materialToDelete) {
                materialToDelete.remove();
                closeDeleteModal();
                saveOrderToLocal();
                showToast('✓ تم حذف المادة');
                materialToDelete = null;
                currentEditElement = null;
            }
        }

        function startEditText() {
            if (currentEditElement) {
                const textSpan = currentEditElement.querySelector('.btn-text');
                if (textSpan) {
                    textSpan.setAttribute('contenteditable', 'true');
                    textSpan.focus();
                } else {
                    currentEditElement.setAttribute('contenteditable', 'true');
                    currentEditElement.focus();
                }
                hideEditPopup();
                const rect = currentEditElement.getBoundingClientRect();
                const confirmPopup = document.getElementById('confirmPopup');
                let popY = rect.top - 10;
                if (popY < 60) popY = rect.bottom + 60;
                confirmPopup.style.left = (rect.left + rect.width / 2) + 'px';
                confirmPopup.style.top = popY + 'px';
                confirmPopup.classList.add('show');
            }
        }

        function confirmTextEdit() {
            if (currentEditElement) {
                const textSpan = currentEditElement.querySelector('.btn-text');
                if (textSpan) {
                    textSpan.removeAttribute('contenteditable');
                } else {
                    currentEditElement.removeAttribute('contenteditable');
                }
                hideConfirmPopup();
                showToast('✓ تم تحديث الاسم');
                currentEditElement = null;
            }
        }

        function cancelTextEdit() {
            if (currentEditElement) {
                const textSpan = currentEditElement.querySelector('.btn-text');
                if (textSpan) {
                    textSpan.innerText = originalText;
                    textSpan.removeAttribute('contenteditable');
                } else {
                    currentEditElement.innerText = originalText;
                    currentEditElement.removeAttribute('contenteditable');
                }
                hideConfirmPopup();
                currentEditElement = null;
            }
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
        }

        // ======================== التحديث ========================
        function checkForUpdate() {
            if (typeof AndroidBridge !== 'undefined' && AndroidBridge.checkForUpdate) {
                AndroidBridge.checkForUpdate();
            } else {
                showToast("زر التحديث يعمل داخل التطبيق فقط 🚀");
            }
        }

        // ======================== توست الإشعارات ========================
        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            document.getElementById('toastText').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function hideEditPopup() {
            document.getElementById('editPopup').classList.remove('show');
        }
        function hideConfirmPopup() {
            document.getElementById('confirmPopup').classList.remove('show');
        }

        // ======================== منع التنقل عند التعديل ========================
        document.addEventListener('click', function(e) {
            if (editMode) {
                const link = e.target.closest('a');
                if (link && !link.hasAttribute('contenteditable')) {
                    e.preventDefault();
                }
            }
        });

        // ======================== التهيئة ========================
        window.addEventListener('load', () => {
            initSortable();
            restoreOrderFromLocal();
            loadTheme();
            loadEditMode();

            const allBtns = document.querySelectorAll('.neon-btn');
            allBtns.forEach(btn => {
                btn.addEventListener('touchstart', onTouchStart, { passive: true });
                btn.addEventListener('touchend', onTouchEnd);
                btn.addEventListener('touchmove', onTouchMove);
                btn.addEventListener('mousedown', onTouchStart);
                btn.addEventListener('mouseup', onTouchEnd);
                btn.addEventListener('mouseleave', onTouchEnd);
            });
        });
    </script>
</body>
</html>
